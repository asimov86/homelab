services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - jarvis_network

volumes:
  uptime_kuma_data:

networks:
  jarvis_network:
    external: true
