services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.0.24:3000,homepage.jarvis.local

    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - jarvis_network

networks:
  jarvis_network:
    external: true
